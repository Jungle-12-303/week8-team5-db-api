<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460">
  <defs>
    <style>
      .title { font: 700 19px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #374151; letter-spacing: 1px; }
      .subtitle { font: 500 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #6b7280; }
      .cardTitle { font: 800 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; letter-spacing: .5px; }
      .keyText { font: 700 16px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; }
      .rootRibbon { fill: #facc15; }
      .internalRibbon { fill: #2dd4bf; }
      .leafRibbon { fill: #60a5fa; }
      .card { fill: #fbfdfc; stroke-width: 2; }
      .rootCard { stroke: #facc15; }
      .internalCard { stroke: #2dd4bf; }
      .leafCard { stroke: #60a5fa; }
      .treeLine { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#darkArrow); }
      .leafLink { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#greenArrow); }
      .chevron { font: 700 28px 'Segoe UI', sans-serif; fill: #374151; }
    </style>
    <marker id="darkArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1200" height="460" fill="#ffffff"/>

  <text x="46" y="220" class="title">B+TREE 구조</text>
  <text x="46" y="242" class="subtitle">data keys: 1 2 3 4 5 6 7 8 9</text>
  <text x="46" y="260" class="subtitle">Internal separator keys also appear in the leaf level.</text>

  <g transform="translate(270 86)">
    <polygon points="0,0 70,0 88,33 70,66 0,66" class="rootRibbon"/>
    <rect x="70" y="0" width="150" height="66" class="card rootCard"/>
    <text x="25" y="40" class="cardTitle">01</text>
    <text x="94" y="27" class="cardTitle">ROOT</text>
    <text x="94" y="51" class="keyText">4 | 7</text>
  </g>

  <text x="518" y="130" class="chevron">&gt;</text>

  <g transform="translate(570 34)">
    <polygon points="0,0 58,0 76,33 58,66 0,66" class="internalRibbon"/>
    <rect x="58" y="0" width="150" height="66" class="card internalCard"/>
    <text x="20" y="40" class="cardTitle">02</text>
    <text x="82" y="27" class="cardTitle">INTERNAL</text>
    <text x="82" y="51" class="keyText">2 | 3</text>
  </g>

  <g transform="translate(570 134)">
    <polygon points="0,0 58,0 76,33 58,66 0,66" class="internalRibbon"/>
    <rect x="58" y="0" width="150" height="66" class="card internalCard"/>
    <text x="20" y="40" class="cardTitle">03</text>
    <text x="82" y="27" class="cardTitle">INTERNAL</text>
    <text x="82" y="51" class="keyText">5 | 6</text>
  </g>

  <g transform="translate(570 234)">
    <polygon points="0,0 58,0 76,33 58,66 0,66" class="internalRibbon"/>
    <rect x="58" y="0" width="150" height="66" class="card internalCard"/>
    <text x="20" y="40" class="cardTitle">04</text>
    <text x="82" y="27" class="cardTitle">INTERNAL</text>
    <text x="82" y="51" class="keyText">8 | 9</text>
  </g>

  <path d="M490 119 L530 119 L530 67 L570 67" class="treeLine"/>
  <path d="M490 119 L530 119 L530 167 L570 167" class="treeLine"/>
  <path d="M490 119 L530 119 L530 267 L570 267" class="treeLine"/>

  <text x="807" y="130" class="chevron">&gt;</text>
  <text x="807" y="230" class="chevron">&gt;</text>
  <text x="807" y="330" class="chevron">&gt;</text>

  <g transform="translate(858 0)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafRibbon"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCard"/>
    <text x="18" y="37" class="cardTitle">05</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">1</text>
  </g>

  <g transform="translate(858 74)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafRibbon"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCard"/>
    <text x="18" y="37" class="cardTitle">06</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">2 | 3</text>
  </g>

  <g transform="translate(858 148)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafRibbon"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCard"/>
    <text x="18" y="37" class="cardTitle">07</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">4</text>
  </g>

  <g transform="translate(858 222)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafRibbon"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCard"/>
    <text x="18" y="37" class="cardTitle">08</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">5 | 6</text>
  </g>

  <g transform="translate(858 296)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafRibbon"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCard"/>
    <text x="18" y="37" class="cardTitle">09</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">7</text>
  </g>

  <g transform="translate(858 370)">
    <polygon points="0,0 54,0 72,30 54,60 0,60" class="leafRibbon"/>
    <rect x="54" y="0" width="120" height="60" class="card leafCard"/>
    <text x="18" y="37" class="cardTitle">10</text>
    <text x="78" y="22" class="cardTitle">LEAF</text>
    <text x="78" y="43" class="keyText">8 | 9</text>
  </g>

  <path d="M778 67 L818 67 L818 30 L858 30" class="treeLine"/>
  <path d="M778 67 L818 67 L818 104 L858 104" class="treeLine"/>
  <path d="M778 167 L818 167 L818 178 L858 178" class="treeLine"/>
  <path d="M778 167 L818 167 L818 252 L858 252" class="treeLine"/>
  <path d="M778 267 L818 267 L818 326 L858 326" class="treeLine"/>
  <path d="M778 267 L818 267 L818 400 L858 400" class="treeLine"/>

  <path d="M1032 30 L1082 30 L1082 104 L1032 104" class="leafLink"/>
  <path d="M1032 104 L1082 104 L1082 178 L1032 178" class="leafLink"/>
  <path d="M1032 178 L1082 178 L1082 252 L1032 252" class="leafLink"/>
  <path d="M1032 252 L1082 252 L1082 326 L1032 326" class="leafLink"/>
  <path d="M1032 326 L1082 326 L1082 400 L1032 400" class="leafLink"/>

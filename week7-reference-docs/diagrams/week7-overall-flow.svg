<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #1f2937; }
      .label { font: 600 20px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #111827; }
      .small { font: 500 15px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #374151; }
      .box1 { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 20; }
      .box2 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 20; }
      .box3 { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 20; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="#fcfcfb"/>
  <text x="60" y="55" class="title">Week 7 전체 실행 구조</text>

  <rect x="50" y="120" width="170" height="110" class="box1"/>
  <text x="110" y="165" class="label">입력</text>
  <text x="84" y="195" class="small">CLI / SQL 파일 / REPL</text>

  <rect x="260" y="120" width="170" height="110" class="box1"/>
  <text x="314" y="165" class="label">SQL 계층</text>
  <text x="287" y="195" class="small">lexer / parser / AST</text>

  <rect x="470" y="120" width="190" height="110" class="box2"/>
  <text x="517" y="165" class="label">실행 계층</text>
  <text x="495" y="195" class="small">INSERT / SELECT 분기</text>

  <rect x="705" y="70" width="190" height="110" class="box3"/>
  <text x="767" y="115" class="label">저장소</text>
  <text x="739" y="145" class="small">schema / CSV 읽기쓰기</text>

  <rect x="705" y="205" width="190" height="110" class="box3"/>
  <text x="772" y="250" class="label">인덱스</text>
  <text x="739" y="280" class="small">B+ 트리 / table index</text>

  <rect x="950" y="120" width="190" height="110" class="box1"/>
  <text x="1006" y="165" class="label">출력</text>
  <text x="973" y="195" class="small">결과 표 / 오류 메시지</text>

  <path d="M220 175 L260 175" class="arrow"/>
  <path d="M430 175 L470 175" class="arrow"/>
  <path d="M660 155 L705 125" class="arrow"/>
  <path d="M660 195 L705 250" class="arrow"/>
  <path d="M895 175 L950 175" class="arrow"/>

  <text x="68" y="350" class="small">핵심 포인트: execution 계층이</text>
  <text x="68" y="375" class="small">일반 WHERE는 storage로, WHERE id는 index로 보낸다.</text>
</svg>
